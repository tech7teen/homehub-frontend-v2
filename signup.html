<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for HomeHub - Housing Ecosystem">
    <title>Sign Up - HomeHub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;700&family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root" class="auth-page">
        <!-- Navigation -->
        <nav class="top-nav">
            <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
                <a href="index.html" class="logo-brand">HomeHub</a>
                <div></div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Create Your Account</h1>
                    <p>Join HomeHub and start managing your housing today</p>
                </div>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form">
                    <!-- Role Selection -->
                    <div class="form-group">
                        <label for="role">I am a...</label>
                        <select id="role" name="role" required>
                            <option value="">Select your role</option>
                            <option value="tenant">Tenant - Rent a property</option>
                            <option value="homeowner">Homeowner - Own a property</option>
                            <option value="landlord">Landlord - Manage rental properties</option>
                            <option value="agent">Property Agent - Manage multiple properties</option>
                        </select>
                        <span id="role-error" class="form-error"></span>
                    </div>

                    <!-- Role Description -->
                    <div id="role-description" class="alert alert-info" style="margin-bottom: var(--spacing-md); display: none;">
                        <span id="role-desc-text"></span>
                    </div>

                    <!-- Full Name Field -->
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="John Doe" 
                            required 
                            autocomplete="name"
                        >
                        <span id="name-error" class="form-error"></span>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="your@email.com" 
                            required 
                            autocomplete="email"
                        >
                        <span id="email-error" class="form-error"></span>
                    </div>

                    <!-- Phone Field -->
                    <div class="form-group">
                        <label for="phone">Phone Number (Optional)</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="+254 7XX XXX XXX" 
                            autocomplete="tel"
                        >
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Create a strong password" 
                            required 
                            autocomplete="new-password"
                        >
                        <span id="password-error" class="form-error"></span>
                        <small style="color: var(--color-text-secondary); margin-top: var(--spacing-xs); display: block;">
                            At least 8 characters with a mix of letters and numbers
                        </small>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="password-confirm">Confirm Password</label>
                        <input 
                            type="password" 
                            id="password-confirm" 
                            name="password-confirm" 
                            placeholder="Confirm your password" 
                            required 
                            autocomplete="new-password"
                        >
                        <span id="password-confirm-error" class="form-error"></span>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="form-group" style="flex-direction: row; align-items: flex-start;">
                        <input 
                            type="checkbox" 
                            id="terms" 
                            name="terms" 
                            required 
                            style="width: auto; margin-right: var(--spacing-sm); margin-top: 5px;"
                        >
                        <label for="terms" style="margin-bottom: 0;">
                            I agree to the <a href="#" class="text-accent">Terms of Service</a> and 
                            <a href="#" class="text-accent">Privacy Policy</a>
                        </label>
                    </div>
                    <span id="terms-error" class="form-error"></span>

                    <!-- Form Error Alert -->
                    <div id="form-error-alert" class="alert alert-error hidden" style="margin-bottom: var(--spacing-md);">
                        <span id="form-error-message"></span>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-full btn-large" id="submit-btn">
                        <span id="submit-text">Create Account</span>
                        <span id="submit-spinner" class="spinner" style="display: none; margin-left: var(--spacing-sm);"></span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>Or</span>
                </div>

                <!-- Login Link -->
                <div class="auth-footer">
                    <p>Already have an account? 
                        <a href="login.html" class="text-accent text-bold">Login here</a>
                    </p>
                </div>

                <!-- Security Note -->
                <div class="auth-security-note">
                    <p>🔒 Your information is secure and encrypted</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if already authenticated
            const token = localStorage.getItem(API_CONFIG.STORAGE_KEYS.AUTH_TOKEN);
            if (token) {
                const role = localStorage.getItem(API_CONFIG.STORAGE_KEYS.USER_ROLE);
                if (role) {
                    window.location.href = `dashboard-${role}.html`;
                    return;
                }
            }

            // Role descriptions
            const roleDescriptions = {
                tenant: '👤 Tenants can pay rent, request maintenance, connect with neighbors, and discover local services.',
                homeowner: '🏠 Homeowners can track utilities, manage security alerts, engage with community, and find service providers.',
                landlord: '🏢 Landlords can collect rent, manage tenants, track maintenance, and view property analytics.',
                agent: '🤝 Property agents can manage multiple properties, track collections, and monitor tenant communications.'
            };

            const roleSelect = document.getElementById('role');
            const roleDescription = document.getElementById('role-description');
            const roleDescText = document.getElementById('role-desc-text');

            // Update role description on change
            roleSelect.addEventListener('change', function() {
                if (this.value && roleDescriptions[this.value]) {
                    roleDescText.textContent = roleDescriptions[this.value];
                    roleDescription.style.display = 'block';
                } else {
                    roleDescription.style.display = 'none';
                }
            });

            // Handle signup form
            const signupForm = document.getElementById('signup-form');
            const submitBtn = document.getElementById('submit-btn');
            const formErrorAlert = document.getElementById('form-error-alert');
            const formErrorMessage = document.getElementById('form-error-message');

            signupForm.addEventListener('submit', async function(event) {
                event.preventDefault();

                // Clear previous errors
                formErrorAlert.classList.add('hidden');
                document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

                // Get form values
                const role = document.getElementById('role').value.trim();
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('password-confirm').value;
                const termsAccepted = document.getElementById('terms').checked;

                // Validation
                let hasErrors = false;

                if (!role) {
                    document.getElementById('role-error').textContent = 'Please select your role';
                    hasErrors = true;
                }

                if (!name || name.length < 2) {
                    document.getElementById('name-error').textContent = 'Please enter a valid name';
                    hasErrors = true;
                }

                if (!email || !email.includes('@')) {
                    document.getElementById('email-error').textContent = 'Please enter a valid email';
                    hasErrors = true;
                }

                if (!password || password.length < 8) {
                    document.getElementById('password-error').textContent = 'Password must be at least 8 characters';
                    hasErrors = true;
                }

                if (password !== passwordConfirm) {
                    document.getElementById('password-confirm-error').textContent = 'Passwords do not match';
                    hasErrors = true;
                }

                if (!termsAccepted) {
                    document.getElementById('terms-error').textContent = 'You must agree to the terms';
                    hasErrors = true;
                }

                if (hasErrors) {
                    return;
                }

                // Show loading state
                submitBtn.disabled = true;
                document.getElementById('submit-text').style.display = 'none';
                document.getElementById('submit-spinner').style.display = 'inline-block';

                try {
                    const success = await handleSignup(role, name, email, password, phone);
                    if (success) {
                        // Redirect is handled in handleSignup
                    } else {
                        formErrorMessage.textContent = 'Signup failed. Please try again or contact support.';
                        formErrorAlert.classList.remove('hidden');
                        submitBtn.disabled = false;
                        document.getElementById('submit-text').style.display = 'inline';
                        document.getElementById('submit-spinner').style.display = 'none';
                    }
                } catch (error) {
                    console.error('Signup error:', error);
                    formErrorMessage.textContent = 'Connection error. Please check your internet and try again.';
                    formErrorAlert.classList.remove('hidden');
                    submitBtn.disabled = false;
                    document.getElementById('submit-text').style.display = 'inline';
                    document.getElementById('submit-spinner').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
